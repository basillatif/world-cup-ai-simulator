<svg viewBox="0 0 980 800" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#64748b"/>
    </marker>
    <marker id="arrowAmber" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#b45309"/>
    </marker>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0f172a" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- Title -->
  <text x="490" y="40" text-anchor="middle" font-size="26" font-weight="700" fill="#0f172a">World Cup AI Simulator — Architecture</text>
  <g>
    <rect x="190" y="58" width="600" height="34" rx="17" fill="#f1f5f9" stroke="#cbd5e1"/>
    <text x="490" y="80" text-anchor="middle" font-size="14" font-weight="600" fill="#334155">The statistical model owns every prediction&#160;&#160;·&#160;&#160;Claude owns the narration</text>
  </g>

  <!-- ===== Prediction pipeline (the spine) ===== -->
  <!-- Data layer -->
  <g filter="url(#soft)">
    <rect x="150" y="120" width="380" height="58" rx="10" fill="#0f766e"/>
    <text x="340" y="145" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">Data Layer</text>
    <text x="340" y="165" text-anchor="middle" font-size="12.5" fill="#d1faf4">2026 field — 48 teams, 12 groups · historical match results</text>
  </g>

  <!-- Models row -->
  <g filter="url(#soft)">
    <rect x="150" y="216" width="182" height="64" rx="10" fill="#1d4ed8"/>
    <text x="241" y="241" text-anchor="middle" font-size="14.5" font-weight="700" fill="#ffffff">Elo Model</text>
    <text x="241" y="260" text-anchor="middle" font-size="11.5" fill="#dbeafe">World Football variant</text>
    <text x="241" y="274" text-anchor="middle" font-size="11.5" fill="#dbeafe">K-factor · GD multiplier · home adv.</text>
  </g>
  <g filter="url(#soft)">
    <rect x="348" y="216" width="182" height="64" rx="10" fill="#1d4ed8"/>
    <text x="439" y="241" text-anchor="middle" font-size="14.5" font-weight="700" fill="#ffffff">Poisson Model</text>
    <text x="439" y="260" text-anchor="middle" font-size="11.5" fill="#dbeafe">Dixon–Coles style</text>
    <text x="439" y="274" text-anchor="middle" font-size="11.5" fill="#dbeafe">fit via MLE</text>
  </g>

  <!-- Ensemble -->
  <g filter="url(#soft)">
    <rect x="150" y="318" width="380" height="58" rx="10" fill="#4338ca"/>
    <text x="340" y="343" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">Ensemble Match Predictor</text>
    <text x="340" y="363" text-anchor="middle" font-size="12.5" fill="#e0e7ff">Elo 45% / Poisson 55% · scoreline rejection sampling</text>
  </g>

  <!-- Monte Carlo -->
  <g filter="url(#soft)">
    <rect x="150" y="414" width="380" height="58" rx="10" fill="#6d28d9"/>
    <text x="340" y="439" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">Monte Carlo Tournament Simulator</text>
    <text x="340" y="459" text-anchor="middle" font-size="12.5" fill="#ede9fe">10,000 iterations · seeded for reproducibility</text>
  </g>

  <!-- Computed statistics (the junction) -->
  <g filter="url(#soft)">
    <rect x="150" y="510" width="380" height="58" rx="10" fill="#334155"/>
    <text x="340" y="535" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">Pre-computed Statistics</text>
    <text x="340" y="555" text-anchor="middle" font-size="12.5" fill="#e2e8f0">advance % · win % · scoreline distributions</text>
  </g>

  <!-- Dashboard -->
  <g filter="url(#soft)">
    <rect x="150" y="700" width="380" height="64" rx="10" fill="#0f172a"/>
    <text x="340" y="728" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">Streamlit Dashboard</text>
    <text x="340" y="748" text-anchor="middle" font-size="12.5" fill="#cbd5e1">4 pages · Group Analysis = home</text>
  </g>

  <!-- ===== Claude narration branch (set apart) ===== -->
  <g filter="url(#soft)">
    <rect x="610" y="496" width="320" height="86" rx="10" fill="#b45309"/>
    <text x="770" y="523" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">Claude Analyst Layer</text>
    <text x="770" y="543" text-anchor="middle" font-size="12.5" fill="#fde9cf">claude-sonnet-4-6 · 4 analysis modes</text>
    <text x="770" y="565" text-anchor="middle" font-size="12" font-weight="600" fill="#fff7ed">reads statistics → writes explanations (never predicts)</text>
  </g>

  <!-- ===== Arrows: prediction spine ===== -->
  <!-- data -> models (split) -->
  <path d="M300,178 L241,216" fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M380,178 L439,216" fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- models -> ensemble (merge) -->
  <path d="M241,280 L300,318" fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M439,280 L380,318" fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- ensemble -> mc -->
  <path d="M340,376 L340,414" fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- mc -> stats -->
  <path d="M340,472 L340,510" fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- stats -> dashboard -->
  <path d="M340,568 L340,700" fill="none" stroke="#64748b" stroke-width="2.4" marker-end="url(#arrow)"/>

  <!-- ===== Arrows: Claude branch (one-way only) ===== -->
  <!-- stats -> claude (in) -->
  <path d="M530,539 L610,539" fill="none" stroke="#b45309" stroke-width="2.4" marker-end="url(#arrowAmber)"/>
  <text x="570" y="529" text-anchor="middle" font-size="11" font-weight="600" fill="#b45309">stats in</text>
  <!-- claude -> dashboard (out) -->
  <path d="M700,582 C660,640 600,690 522,724" fill="none" stroke="#b45309" stroke-width="2.4" marker-end="url(#arrowAmber)"/>
  <text x="612" y="650" text-anchor="middle" font-size="11" font-weight="600" fill="#b45309">narration out</text>

  <!-- explicit "no feedback" cue -->
  <g>
    <path d="M770,496 C770,360 770,300 545,300" fill="none" stroke="#cbd5e1" stroke-width="2" stroke-dasharray="5 6"/>
    <circle cx="770" cy="398" r="13" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
    <path d="M763,391 L777,405 M777,391 L763,405" stroke="#ef4444" stroke-width="2.2" stroke-linecap="round"/>
    <text x="788" y="402" font-size="11" font-weight="600" fill="#b91c1c">no predictions flow back</text>
  </g>
</svg>

name: Update World Cup Results

on:
  # Daily during the tournament window. Adjust/disable once the tournament ends.
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update-results:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch latest results
        env:
          RESULTS_PROVIDER: ${{ secrets.RESULTS_PROVIDER }}
          RESULTS_API_KEY: ${{ secrets.RESULTS_API_KEY }}
          RESULTS_API_URL: ${{ secrets.RESULTS_API_URL }}
        run: python scripts/update_results.py

      - name: Commit updated results
        run: |
          if git diff --quiet -- data/sample/results.csv; then
            echo "No changes to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/sample/results.csv
          git commit -m "Update World Cup actual results"
          git push
